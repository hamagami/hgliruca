<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>現況ダッシュボード</title>
  <style>
    :root {
      --bg: #071018;
      --panel: #0c1721;
      --line: rgba(165, 190, 215, 0.18);
      --line-strong: rgba(165, 190, 215, 0.34);
      --text: #e7eef6;
      --muted: #8ea0b4;
      --presence: #2f8cff;
      --training: #f2a23a;
      --red: #ff6b6b;
      --cyan: #41c7e8;
      --green: #43d17a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif;
    }

    .page {
      height: 100vh;
      padding: 14px;
      display: grid;
      grid-template-rows: 58px 1fr;
      gap: 10px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(12, 23, 33, 0.88);
      padding: 10px 14px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(7, 11, 16, 0.34);
      padding: 5px 8px;
      white-space: nowrap;
    }

    .dashboard {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.9fr) minmax(390px, 0.95fr);
      gap: 10px;
    }

    .left {
      min-height: 0;
      display: grid;
      grid-template-rows: 92px minmax(0, 1fr) 260px;
      gap: 10px;
    }

    .right {
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      min-height: 0;
    }

    .kpi,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(12, 23, 33, 0.86);
      min-width: 0;
    }

    .kpi {
      padding: 10px 12px;
      display: grid;
      align-content: center;
      gap: 3px;
      overflow: hidden;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .kpi-sub {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kpi.presence .kpi-value { color: var(--presence); }
    .kpi.training .kpi-value { color: var(--training); }
    .kpi.unknown .kpi-value { color: var(--red); }

    .panel {
      min-height: 0;
      display: grid;
      grid-template-rows: 45px minmax(0, 1fr);
      overflow: hidden;
    }

    .panel-head {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding: 9px 12px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-note {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .chart-body {
      min-height: 0;
      position: relative;
      padding: 6px 8px 8px;
    }

    .chart-body.calculating::before {
      content: "";
      position: absolute;
      inset: 6px 8px 8px;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(65, 199, 232, 0.16), transparent),
        repeating-linear-gradient(90deg, rgba(65, 199, 232, 0.05) 0 1px, transparent 1px 42px);
      transform: translateX(-100%);
      animation: scanline 3.8s linear infinite;
      z-index: 2;
      mix-blend-mode: screen;
    }

    .chart-body.calculating::after {
      content: "";
      position: absolute;
      inset: 6px 8px 8px;
      pointer-events: none;
      border: 1px solid rgba(65, 199, 232, 0.12);
      box-shadow: inset 0 0 18px rgba(65, 199, 232, 0.06);
      animation: pulsegrid 2.6s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes scanline {
      0% { transform: translateX(-100%); opacity: 0; }
      10% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translateX(100%); opacity: 0; }
    }

    @keyframes pulsegrid {
      0%, 100% { opacity: 0.38; }
      50% { opacity: 0.86; }
    }

    .score-tools {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(7, 11, 16, 0.42);
      color: var(--text);
      font: inherit;
      font-size: 11px;
      padding: 5px 8px;
      cursor: pointer;
    }

    button.active {
      border-color: rgba(65, 199, 232, 0.72);
      background: rgba(65, 199, 232, 0.14);
      color: #dff8ff;
    }

    label.checkbox {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .trend-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .members {
      min-height: 0;
      overflow: hidden;
    }

    .member-grid {
      min-height: 0;
      overflow: hidden;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      align-content: start;
    }

    .member {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(7, 11, 16, 0.35);
      padding: 7px 8px;
    }

    .member.is-presence {
      border-color: rgba(47, 140, 255, 0.55);
      background: rgba(47, 140, 255, 0.17);
    }

    .member.is-training {
      border-color: rgba(242, 162, 58, 0.58);
      background: rgba(242, 162, 58, 0.20);
    }

    .member-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      min-width: 0;
      margin-bottom: 4px;
    }

    .member-name {
      font-size: 12px;
      font-weight: 760;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .member-time {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      font-family: Consolas, "Courier New", monospace;
    }

    .status-pill {
      display: inline-block;
      max-width: 100%;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-presence { background: rgba(47, 140, 255, 0.18); color: #9fc8ff; }
    .status-training { background: rgba(242, 162, 58, 0.18); color: #ffd299; }
    .status-away { background: rgba(142, 160, 180, 0.14); color: var(--muted); }
    .status-unknown { background: rgba(255, 107, 107, 0.16); color: #ffb6b6; }

    .member-message {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .error {
      color: #ffd1d1;
      background: rgba(255, 107, 107, 0.12);
      border: 1px solid rgba(255, 107, 107, 0.35);
      border-radius: 7px;
      padding: 10px;
      font-size: 12px;
    }

    @media (max-width: 1200px) {
      body { overflow: auto; }
      .page { min-height: 100vh; height: auto; }
      .dashboard { grid-template-columns: 1fr; }
      .left { grid-template-rows: auto 520px 260px; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .member-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>現況ダッシュボード</h1>
      </div>
      <div class="header-meta">
        <span class="badge">LIVE <strong id="clock">--:--:--</strong></span>
        <span class="badge">更新 <strong id="updated">—</strong></span>
        <span class="badge">DATA <strong id="dataState">loading</strong></span>
      </div>
    </header>

    <section class="dashboard">
      <section class="left">
        <div class="kpis">
          <div class="kpi"><div class="kpi-label">Total</div><div class="kpi-value" id="total">—</div><div class="kpi-sub">メンバー</div></div>
          <div class="kpi presence"><div class="kpi-label">Presence</div><div class="kpi-value" id="presence">—</div><div class="kpi-sub">在席中</div></div>
          <div class="kpi training"><div class="kpi-label">Training</div><div class="kpi-value" id="training">—</div><div class="kpi-sub">研修中</div></div>
          <div class="kpi"><div class="kpi-label">Away</div><div class="kpi-value" id="away">—</div><div class="kpi-sub">離席/帰宅</div></div>
          <div class="kpi unknown"><div class="kpi-label">Unknown</div><div class="kpi-value" id="unknown">—</div><div class="kpi-sub">8h+ 経過</div></div>
        </div>

        <article class="panel">
          <div class="panel-head">
            <h2>個人別 取り組み充足率</h2>
            <div class="score-tools">
              <span class="panel-note" id="scoreNote">30日 / baseline 週20h</span>
              <button type="button" data-range="7">7日</button>
              <button class="active" type="button" data-range="30">30日</button>
              <button type="button" data-range="all">全期間</button>
              <label class="checkbox"><input id="ignoreTrainingCap" type="checkbox">研修上限を無視</label>
            </div>
          </div>
          <div class="chart-body"><canvas id="scoreChart"></canvas></div>
        </article>

        <div class="trend-grid">
          <article class="panel">
            <div class="panel-head"><h2>人数推移</h2><div class="panel-note">直近30日</div></div>
            <div class="chart-body calculating"><canvas id="trend30Chart"></canvas></div>
          </article>
          <article class="panel">
            <div class="panel-head"><h2>短期トレンド</h2><div class="panel-note">直近5日</div></div>
            <div class="chart-body calculating"><canvas id="trend5Chart"></canvas></div>
          </article>
        </div>
      </section>

      <section class="right">
        <article class="panel members">
          <div class="panel-head">
            <h2>現在のステータス</h2>
            <div class="panel-note" id="memberBadge">—</div>
          </div>
          <div class="member-grid" id="memberGrid">
            <div class="error">読み込み中...</div>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script>
    const PTIMELOG_URL = "https://www.dropbox.com/scl/fi/2f7uqexibzi48biywqgyz/ptimelog.json?rlkey=j3ugfwmcvmowza0r9x1b2jsfs&dl=0";
    const LIVE_MEMBER_URL = "https://iruca.co/api/rooms/fc8c0139-0461-4681-af03-04063968ac05/members";
    const LIVE_TIME_URL = "https://dl.dropbox.com/scl/fi/mc32neviwl1vydbx8c4nd/status_summary_by_time.json?rlkey=31aylckuac30jfws0l1o4y70m&dl=1";
    const CORS_PROXY_URL = "https://api.allorigins.win/raw?url=";
    const LIVE_UNKNOWN_MS = 8 * 60 * 60 * 1000;
    const EXCLUDE_PREFIXES = ["HMG", "TKH", "HGW"];
    const COLORS = {
      grid: "rgba(164, 192, 220, 0.13)",
      ticks: "#8ea0b4",
      text: "#e7eef6",
      presence: "#2f8cff",
      training: "#f2a23a",
      cyan: "#41c7e8"
    };

    const els = {
      clock: document.getElementById("clock"),
      updated: document.getElementById("updated"),
      dataState: document.getElementById("dataState"),
      total: document.getElementById("total"),
      presence: document.getElementById("presence"),
      training: document.getElementById("training"),
      away: document.getElementById("away"),
      unknown: document.getElementById("unknown"),
      memberBadge: document.getElementById("memberBadge"),
      memberGrid: document.getElementById("memberGrid"),
      scoreNote: document.getElementById("scoreNote"),
      scoreChart: document.getElementById("scoreChart"),
      trend30Chart: document.getElementById("trend30Chart"),
      trend5Chart: document.getElementById("trend5Chart"),
      ignoreTrainingCap: document.getElementById("ignoreTrainingCap"),
      rangeButtons: document.querySelectorAll("button[data-range]")
    };

    let ptimeLog = null;
    let membersByName = new Map();
    let scoreRange = "30";
    let scoreAnimationFrame = 0;
    let scoreGlowFrame = 0;
    let lastScoreChartPayload = null;

    function normalizeDropboxUrl(url) {
      const parsed = new URL(url, location.href);
      if (parsed.hostname === "www.dropbox.com") {
        parsed.hostname = "dl.dropboxusercontent.com";
        parsed.searchParams.set("dl", "1");
        parsed.searchParams.delete("raw");
      }
      return parsed.toString();
    }

    function jsonCandidates(url) {
      const list = [url];
      try {
        const parsed = new URL(url, location.href);
        if (parsed.hostname.endsWith("dropbox.com")) {
          const direct = new URL(parsed.toString());
          direct.hostname = "dl.dropboxusercontent.com";
          direct.searchParams.set("dl", "1");
          direct.searchParams.delete("raw");
          list.push(direct.toString());
        }
      } catch {}
      return [...new Set(list)];
    }

    async function fetchJson(url) {
      let lastError = null;
      for (const candidate of jsonCandidates(url)) {
        try {
          const response = await fetch(candidate, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.json();
        } catch (error) {
          lastError = error;
        }
      }
      const proxied = CORS_PROXY_URL + encodeURIComponent(url);
      const response = await fetch(proxied, { cache: "no-store" });
      if (!response.ok) throw lastError || new Error(`HTTP ${response.status}`);
      return await response.json();
    }

    function hours(seconds) {
      return Number(seconds || 0) / 3600;
    }

    function dayKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function addDays(date, days) {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function weeksBetween(start, end) {
      const ms = end - start;
      return Number.isFinite(ms) && ms > 0 ? ms / (7 * 24 * 60 * 60 * 1000) : 1;
    }

    function rangeFromMode() {
      const meta = ptimeLog?.metadata || {};
      const rangeStart = meta.range_start ? new Date(meta.range_start) : null;
      const rangeEnd = meta.range_end ? new Date(meta.range_end) : null;
      if (!rangeStart || !rangeEnd || Number.isNaN(rangeStart) || Number.isNaN(rangeEnd)) return null;
      if (scoreRange === "all") return { start: rangeStart, end: rangeEnd, label: "全期間" };
      const days = Number(scoreRange || 30);
      const start = addDays(rangeEnd, -(days - 1));
      return { start: start < rangeStart ? rangeStart : start, end: rangeEnd, label: `${days}日` };
    }

    function segmentsForRange(user, start, end) {
      return (Array.isArray(user?.segments) ? user.segments : [])
        .map((segment) => {
          const segmentStart = new Date(segment.start);
          const segmentEnd = new Date(segment.end);
          const clippedStart = new Date(Math.max(segmentStart.getTime(), start.getTime()));
          const clippedEnd = new Date(Math.min(segmentEnd.getTime(), end.getTime()));
          if (Number.isNaN(clippedStart) || Number.isNaN(clippedEnd) || clippedEnd <= clippedStart) return null;
          return { ...segment, clippedStart, clippedEnd };
        })
        .filter(Boolean);
    }

    function summarize(segments) {
      const result = { presence: 0, training: 0 };
      for (const segment of segments) {
        const seconds = Math.max(0, (segment.clippedEnd - segment.clippedStart) / 1000);
        if (segment.category === "presence" && segment.quality === "normal") result.presence += seconds;
        else if (segment.category === "training" && segment.quality === "normal") result.training += seconds;
      }
      return result;
    }

    function liveStatus(member) {
      const updated = new Date(member.updated_at).getTime();
      if (!Number.isFinite(updated) || Date.now() - updated > LIVE_UNKNOWN_MS) return "不明";
      return member.status || "その他";
    }

    function isPresenceStatus(status) {
      return status === "在席中" || status === "在席" || status === "蝨ｨ蟶ｭ荳ｭ" || status === "蝨ｨ蟶ｭ";
    }

    function isTrainingStatus(status) {
      return status === "研修中" || status === "遐比ｿｮ荳ｭ";
    }

    function statusClass(status) {
      if (isPresenceStatus(status)) return "status-presence";
      if (isTrainingStatus(status)) return "status-training";
      if (status === "不明" || status === "荳肴・") return "status-unknown";
      return "status-away";
    }

    function cardClass(status) {
      if (isPresenceStatus(status)) return "is-presence";
      if (isTrainingStatus(status)) return "is-training";
      return "";
    }

    function formatElapsed(ms) {
      const minutes = Math.max(0, Math.floor(ms / 60000));
      const hoursValue = Math.floor(minutes / 60);
      const days = Math.floor(hoursValue / 24);
      if (days > 0) return `${days}日前`;
      if (hoursValue > 0) return `${hoursValue}時間前`;
      return `${minutes}分前`;
    }

    function setupCanvas(canvas) {
      const parent = canvas.parentElement;
      const rect = parent.getBoundingClientRect();
      const style = getComputedStyle(parent);
      const paddingX = parseFloat(style.paddingLeft || 0) + parseFloat(style.paddingRight || 0);
      const paddingY = parseFloat(style.paddingTop || 0) + parseFloat(style.paddingBottom || 0);
      const width = Math.max(260, Math.floor((parent.clientWidth || rect.width) - paddingX));
      const height = Math.max(150, Math.floor((parent.clientHeight || rect.height) - paddingY));
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.floor(width * ratio);
      canvas.height = Math.floor(height * ratio);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, width, height);
      ctx.font = '11px "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif';
      ctx.textBaseline = "middle";
      return { ctx, width, height };
    }

    function drawEmpty(canvas, message) {
      const { ctx, width, height } = setupCanvas(canvas);
      ctx.fillStyle = COLORS.ticks;
      ctx.textAlign = "center";
      ctx.fillText(message, width / 2, height / 2);
    }

    function drawStackedBarChart(canvas, labels, presenceData, trainingData, options = {}) {
      const { ctx, width, height } = setupCanvas(canvas);
      const compact = width < 760;
      const plot = {
        left: compact ? 38 : 46,
        right: compact ? 8 : 14,
        top: 22,
        bottom: compact ? 58 : labels.length > 14 ? 74 : 52
      };
      const plotWidth = width - plot.left - plot.right;
      const plotHeight = height - plot.top - plot.bottom;
      const totals = labels.map((_, index) => Number(presenceData[index] || 0) + Number(trainingData[index] || 0));
      const maxValue = Math.max(1, options.baseline || 0, ...totals) * 1.12;
      for (let i = 0; i <= 4; i += 1) {
        const y = plot.top + plotHeight - plotHeight * i / 4;
        const value = maxValue * i / 4;
        ctx.strokeStyle = COLORS.grid;
        ctx.beginPath();
        ctx.moveTo(plot.left, y);
        ctx.lineTo(width - plot.right, y);
        ctx.stroke();
        ctx.fillStyle = COLORS.ticks;
        ctx.textAlign = "right";
        ctx.fillText(value >= 10 ? value.toFixed(0) : value.toFixed(1), plot.left - 8, y);
      }
      if (options.baseline) {
        const y = plot.top + plotHeight - plotHeight * options.baseline / maxValue;
        ctx.save();
        ctx.strokeStyle = "rgba(231, 238, 246, 0.68)";
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(plot.left, y);
        ctx.lineTo(width - plot.right, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "rgba(231, 238, 246, 0.82)";
        ctx.textAlign = "right";
        ctx.fillText(`baseline ${options.baseline.toFixed(1)}h`, width - plot.right - 4, y - 10);
        ctx.restore();
      }
      const groupWidth = plotWidth / labels.length;
      const gap = Math.max(2, groupWidth * 0.16);
      const barWidth = Math.max(3, groupWidth - gap * 2);
      const progress = Math.max(0, Math.min(1, options.progress ?? 1));
      labels.forEach((label, index) => {
        const x = plot.left + index * groupWidth + gap;
        const baseY = plot.top + plotHeight;
        const pHeight = plotHeight * Number(presenceData[index] || 0) / maxValue * progress;
        const tHeight = plotHeight * Number(trainingData[index] || 0) / maxValue * progress;
        const status = options.statuses?.[index] || "";
        const activePresence = isPresenceStatus(status);
        const activeTraining = isTrainingStatus(status);
        const inactive = !activePresence && !activeTraining;
        const glow = options.glow ?? 0;
        const drawFlow = (y, h, color) => {
          if (h <= 2) return;
          const phase = options.flowPhase ?? 0;
          const bandHeight = Math.max(14, Math.min(34, h * 0.36));
          const bandY = y + h - ((phase * (h + bandHeight)) % (h + bandHeight));
          ctx.save();
          ctx.beginPath();
          ctx.rect(x, y, barWidth, h);
          ctx.clip();
          const gradient = ctx.createLinearGradient(0, bandY - bandHeight, 0, bandY);
          gradient.addColorStop(0, "rgba(255,255,255,0)");
          gradient.addColorStop(0.45, color);
          gradient.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = gradient;
          ctx.fillRect(x, bandY - bandHeight, barWidth, bandHeight * 1.4);
          ctx.restore();
        };
        ctx.fillStyle = activePresence
          ? "rgba(47, 140, 255, 0.98)"
          : inactive ? "rgba(47, 140, 255, 0.28)" : "rgba(47, 140, 255, 0.50)";
        ctx.fillRect(x, baseY - pHeight, barWidth, pHeight);
        if (activePresence) drawFlow(baseY - pHeight, pHeight, "rgba(220,240,255,0.54)");
        ctx.fillStyle = activeTraining
          ? "rgba(242, 162, 58, 0.98)"
          : inactive ? "rgba(242, 162, 58, 0.28)" : "rgba(242, 162, 58, 0.50)";
        ctx.fillRect(x, baseY - pHeight - tHeight, barWidth, tHeight);
        if (activeTraining) drawFlow(baseY - pHeight - tHeight, tHeight, "rgba(255,238,196,0.58)");
        if (options.outlineTraining?.[index]) {
          const outlineValue = Math.min(Number(trainingData[index] || 0), Number(options.trainingCapData?.[index] || 0));
          const outlineHeight = plotHeight * outlineValue / maxValue * progress;
          ctx.save();
          ctx.strokeStyle = "rgba(255, 107, 107, 0.95)";
          ctx.lineWidth = 2;
          ctx.strokeRect(x + 1, baseY - pHeight - outlineHeight + 1, Math.max(1, barWidth - 2), Math.max(1, outlineHeight - 2));
          ctx.restore();
        }
        if (options.valueLabels) {
          const total = totals[index];
          const y = baseY - pHeight - tHeight;
          ctx.fillStyle = COLORS.text;
          ctx.textAlign = "center";
          ctx.fillText(`${Math.round(total / options.baseline * 100)}%`, x + barWidth / 2, Math.max(plot.top + 8, y - 10));
        }
        ctx.save();
        ctx.fillStyle = COLORS.ticks;
        ctx.font = `${labels.length > 34 ? 8 : labels.length > 26 ? 9 : 10}px "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif`;
        ctx.translate(x + barWidth / 2, height - plot.bottom + (compact ? 12 : 16));
        ctx.rotate(-Math.PI / 4);
        ctx.textAlign = "right";
        ctx.fillText(label, 0, 0);
        ctx.restore();
      });
    }

    function drawLineChart(canvas, labels, datasets) {
      const { ctx, width, height } = setupCanvas(canvas);
      const plot = { left: 32, right: 14, top: 22, bottom: 30 };
      const plotWidth = width - plot.left - plot.right;
      const plotHeight = height - plot.top - plot.bottom;
      const values = datasets.flatMap((dataset) => dataset.data);
      const maxValue = Math.max(1, ...values) * 1.15;
      for (let i = 0; i <= 3; i += 1) {
        const y = plot.top + plotHeight - plotHeight * i / 3;
        ctx.strokeStyle = COLORS.grid;
        ctx.beginPath();
        ctx.moveTo(plot.left, y);
        ctx.lineTo(width - plot.right, y);
        ctx.stroke();
      }
      datasets.forEach((dataset) => {
        ctx.strokeStyle = dataset.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        dataset.data.forEach((value, index) => {
          const x = plot.left + (labels.length === 1 ? plotWidth / 2 : plotWidth * index / (labels.length - 1));
          const y = plot.top + plotHeight - plotHeight * value / maxValue;
          if (index === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
      });
    }

    function isDisplayMember(name) {
      const match = String(name || "").match(/\(([^)]*)\)/);
      return Boolean(match && /[DMB]/.test(match[1]));
    }

    function renderMembers(members) {
      let presence = 0;
      let training = 0;
      let unknown = 0;
      let away = 0;
      const now = Date.now();
      for (const member of members) {
        const status = liveStatus(member);
        if (isPresenceStatus(status)) presence += 1;
        else if (isTrainingStatus(status)) training += 1;
        else if (status === "不明" || status === "荳肴・") unknown += 1;
        else away += 1;
      }
      els.total.textContent = String(members.length);
      els.presence.textContent = String(presence);
      els.training.textContent = String(training);
      els.away.textContent = String(away);
      els.unknown.textContent = String(unknown);
      els.memberBadge.textContent = `${members.length}名`;
      els.memberGrid.replaceChildren();
      for (const member of members) {
        const status = liveStatus(member);
        const card = document.createElement("div");
        card.className = `member ${cardClass(status)}`;
        const top = document.createElement("div");
        top.className = "member-top";
        const name = document.createElement("div");
        name.className = "member-name";
        name.textContent = member.name || "—";
        const time = document.createElement("div");
        time.className = "member-time";
        time.textContent = formatElapsed(now - new Date(member.updated_at).getTime());
        top.append(name, time);
        const pill = document.createElement("span");
        pill.className = `status-pill ${statusClass(status)}`;
        pill.textContent = status;
        card.append(top, pill);
        if ((member.message || "").trim()) {
          const message = document.createElement("div");
          message.className = "member-message";
          message.textContent = member.message.trim();
          card.appendChild(message);
        }
        els.memberGrid.appendChild(card);
      }
    }

    function renderScoreChart() {
      if (!ptimeLog) {
        drawEmpty(els.scoreChart, "タイムラインJSONを読み込み中です");
        return;
      }
      const range = rangeFromMode();
      if (!range) {
        drawEmpty(els.scoreChart, "集計期間を取得できません");
        return;
      }
      const weeks = weeksBetween(range.start, range.end);
      const baseline = 20 * weeks;
      const trainingCap = 10 * weeks;
      const ignoreCap = els.ignoreTrainingCap.checked;
      const entries = Object.entries(ptimeLog.users || {})
        .filter(([name]) => isDisplayMember(name) && membersByName.has(name))
        .map(([name, user]) => {
          const summary = summarize(segmentsForRange(user, range.start, range.end));
          const presenceHours = hours(summary.presence);
          const trainingHours = hours(summary.training);
          const trainingDisplay = ignoreCap ? trainingHours : Math.min(trainingHours, trainingCap);
          return {
            name,
            presenceHours,
            trainingHours,
            trainingDisplay,
            total: presenceHours + trainingDisplay,
            excess: Math.max(0, trainingHours - trainingCap)
          };
        })
        .sort((a, b) => b.total - a.total || a.name.localeCompare(b.name, "ja"))
        ;
      els.scoreNote.textContent = `${range.label} / baseline ${baseline.toFixed(1)}h / 研修${ignoreCap ? "上限なし" : "週10h上限"}`;
      const labels = entries.map((entry) => entry.name);
      const presenceData = entries.map((entry) => entry.presenceHours);
      const trainingData = entries.map((entry) => entry.trainingDisplay);
      const chartOptions = {
          baseline,
          valueLabels: true,
          outlineTraining: entries.map((entry) => entry.excess > 0),
          trainingCapData: entries.map(() => trainingCap),
          statuses: entries.map((entry) => {
            const member = membersByName.get(entry.name);
            return member ? liveStatus(member) : "";
          })
      };
      cancelAnimationFrame(scoreAnimationFrame);
      cancelAnimationFrame(scoreGlowFrame);
      const startedAt = performance.now();
      const duration = 900;
      const animate = (now) => {
        const raw = Math.min(1, (now - startedAt) / duration);
        const eased = 1 - Math.pow(1 - raw, 3);
        drawStackedBarChart(els.scoreChart, labels, presenceData, trainingData, {
          ...chartOptions,
          progress: eased
        });
        if (raw < 1) scoreAnimationFrame = requestAnimationFrame(animate);
        else {
          lastScoreChartPayload = { labels, presenceData, trainingData, chartOptions };
          startScoreGlow();
        }
      };
      scoreAnimationFrame = requestAnimationFrame(animate);
    }

    function startScoreGlow() {
      if (!lastScoreChartPayload) return;
      const loop = (now) => {
        const flowPhase = (now / 1800) % 1;
        const { labels, presenceData, trainingData, chartOptions } = lastScoreChartPayload;
        drawStackedBarChart(els.scoreChart, labels, presenceData, trainingData, {
          ...chartOptions,
          progress: 1,
          flowPhase
        });
        scoreGlowFrame = requestAnimationFrame(loop);
      };
      scoreGlowFrame = requestAnimationFrame(loop);
    }

    function renderTrends(timeData, days, canvas) {
      const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
      const keys = Object.keys(timeData || {}).sort().filter((key) => new Date(key).getTime() >= cutoff);
      if (!keys.length) {
        drawEmpty(canvas, "データなし");
        return;
      }
      drawLineChart(
        canvas,
        keys,
        [
          { label: "在席", data: keys.map((key) => Number(timeData[key]["在席中"] || timeData[key]["蝨ｨ蟶ｭ荳ｭ"] || 0)), color: COLORS.presence },
          { label: "研修", data: keys.map((key) => Number(timeData[key]["研修中"] || timeData[key]["遐比ｿｮ荳ｭ"] || 0)), color: COLORS.training }
        ]
      );
    }

    async function loadAll() {
      els.dataState.textContent = "loading";
      try {
        const [ptimeResult, membersResult, timeResult] = await Promise.allSettled([
          fetchJson(normalizeDropboxUrl(PTIMELOG_URL)),
          fetchJson(LIVE_MEMBER_URL),
          fetchJson(LIVE_TIME_URL)
        ]);
        if (ptimeResult.status === "fulfilled") {
          ptimeLog = ptimeResult.value;
          els.dataState.textContent = "ready";
          renderScoreChart();
        } else {
          throw ptimeResult.reason;
        }
        if (membersResult.status === "fulfilled") {
          const members = Array.isArray(membersResult.value) ? membersResult.value : membersResult.value.members || [];
          membersByName = new Map(members.filter((member) => member.name).map((member) => [member.name, member]));
          renderMembers(members);
          renderScoreChart();
        }
        if (timeResult.status === "fulfilled") {
          renderTrends(timeResult.value, 30, els.trend30Chart);
          renderTrends(timeResult.value, 5, els.trend5Chart);
        }
        els.updated.textContent = new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
      } catch (error) {
        els.dataState.textContent = "error";
        els.memberGrid.replaceChildren();
        const node = document.createElement("div");
        node.className = "error";
        node.textContent = `読み込みに失敗しました: ${error.message}`;
        els.memberGrid.appendChild(node);
      }
    }

    els.rangeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        scoreRange = button.dataset.range || "30";
        els.rangeButtons.forEach((candidate) => candidate.classList.toggle("active", candidate === button));
        renderScoreChart();
      });
    });
    els.ignoreTrainingCap.addEventListener("change", renderScoreChart);
    window.addEventListener("resize", () => {
      clearTimeout(window.__resizeTimer);
      window.__resizeTimer = setTimeout(() => {
        renderScoreChart();
      }, 120);
    });
    setInterval(() => {
      els.clock.textContent = new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }, 1000);
    setInterval(loadAll, 5 * 60 * 1000);

    loadAll();
  </script>
</body>
